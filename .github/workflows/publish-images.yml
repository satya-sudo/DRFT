name: Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to publish
        required: true
        default: latest
      push_latest:
        description: Also update latest
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"

env:
  API_REPO: dockermaninthehouse/drft-api
  WEB_REPO: dockermaninthehouse/drft-web

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve publish settings
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "push_latest=${{ inputs.push_latest }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "push_latest=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.API_REPO }}:${{ steps.vars.outputs.tag }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.web
          push: true
          tags: ${{ env.WEB_REPO }}:${{ steps.vars.outputs.tag }}

      - name: Tag and push latest aliases
        if: steps.vars.outputs.push_latest == 'true' && steps.vars.outputs.tag != 'latest'
        run: |
          docker buildx imagetools create -t "${API_REPO}:latest" "${API_REPO}:${{ steps.vars.outputs.tag }}"
          docker buildx imagetools create -t "${WEB_REPO}:latest" "${WEB_REPO}:${{ steps.vars.outputs.tag }}"

      - name: Publish summary
        run: |
          echo "Published images:"
          echo "  ${API_REPO}:${{ steps.vars.outputs.tag }}"
          echo "  ${WEB_REPO}:${{ steps.vars.outputs.tag }}"
          if [ "${{ steps.vars.outputs.push_latest }}" = "true" ]; then
            echo "  ${API_REPO}:latest"
            echo "  ${WEB_REPO}:latest"
          fi
